<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rejoindre une soirée — SoberMate</title>
<style>
  body { font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
         background:#0A1B2E; color:#E8EEF5; text-align:center;
         min-height:100vh; margin:0; display:flex; flex-direction:column;
         align-items:center; justify-content:center; padding:32px; }
  .mark { line-height:0; margin-bottom:10px; }
  h1 { font-size:24px; margin:0 0 4px; }
  .code { font-size:15px; color:#9FB3C8; margin:6px 0 22px; letter-spacing:1px; }
  .code b { color:#38BDF8; letter-spacing:4px; }
  p { color:#9FB3C8; font-size:15px; line-height:1.5; max-width:420px; }
  a.btn { display:inline-block; margin-top:18px; background:#0A4FA6; color:#fff;
          text-decoration:none; font-weight:700; padding:13px 22px; border-radius:12px; }
</style>
</head>
<body>
  <div class="mark" aria-hidden="true">
    <svg width="72" height="72" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5CC8F5"/>
          <stop offset="1" stop-color="#0A4FA6"/>
        </linearGradient>
        <clipPath id="shieldClip">
          <path d="M50 18 L76 27 C78 28 79 30 79 33 L79 52 C79 68 66 80 50 86 C34 80 21 68 21 52 L21 33 C21 30 22 28 24 27 Z"/>
        </clipPath>
      </defs>
      <path d="M50 18 L76 27 C78 28 79 30 79 33 L79 52 C79 68 66 80 50 86 C34 80 21 68 21 52 L21 33 C21 30 22 28 24 27 Z" fill="url(#shield)"/>
      <g clip-path="url(#shieldClip)">
        <path d="M21 60 Q35 54 50 60 T79 60 L79 90 L21 90 Z" fill="#34D6E0" opacity="0.92"/>
      </g>
      <path d="M50 30 C56 40 59 45 59 49 A9 9 0 1 1 41 49 C41 45 44 40 50 30 Z" fill="#FFFFFF" opacity="0.95"/>
    </svg>
  </div>
  <h1>Sober<span style="color:#38BDF8">Mate</span></h1>
  <p class="code" id="code"></p>
  <p id="msg">Ouverture de l'application… · Opening the app…</p>
  <a class="btn" id="store" href="#">Télécharger SoberMate · Get the app</a>

<script>
  (function () {
    // ⚠️ PLACEHOLDERS À VÉRIFIER :
    //  - ANDROID : identifiant du package (déjà connu).
    //  - IOS     : remplacer idXXXXXXXXX par l'identifiant App Store une fois l'app publiée.
    var ANDROID = 'https://play.google.com/store/apps/details?id=com.ameig.MonApplicationSoberMate';
    var IOS     = 'https://apps.apple.com/app/sobermate/idXXXXXXXXX';

    var params = new URLSearchParams(location.search);
    var code = (params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var store = isIOS ? IOS : ANDROID;

    document.getElementById('store').href = store;
    if (code) document.getElementById('code').innerHTML = 'Code : <b>' + code + '</b>';

    // 1) Tente d'ouvrir l'app installée via le deep link (même schéma que le QR in-app).
    if (code) {
      location.href = 'monapplicationsobermate://join?code=' + encodeURIComponent(code);
    }
    // 2) Sinon (app absente → le deep link ne fait rien), on bascule vers le store.
    setTimeout(function () {
      document.getElementById('msg').textContent = 'Pas encore installée ? · Not installed yet?';
      location.href = store;
    }, 1600);
  })();
</script>
</body>
</html>
